<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAVG Admin - Panel de Opiniones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #00f0ff;
            --secondary: #11a1ef;
            --accent: #ae77db;
            --dark-1: #0f0f1d;
            --glass-bg: rgba(51, 28, 28, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow-cyan: rgba(0, 240, 255, 0.4);
            --glow-magenta: rgba(255, 0, 212, 0.4);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark-1);
            color: #ffffff;
            min-height: 100vh;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px);
            animation: float 20s ease-in-out infinite;
        }
        .orb-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, var(--glow-cyan) 0%, transparent 70%);
            top: -200px; left: -200px;
        }
        .orb-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--glow-magenta) 0%, transparent 70%);
            bottom: -150px; right: -150px; animation-delay: -7s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -30px) scale(1.05); }
            50% { transform: translate(-30px, 50px) scale(0.95); }
            75% { transform: translate(-50px, -20px) scale(1.02); }
        }

        /* Grid overlay */
        .grid-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 80px 80px;
            pointer-events: none; z-index: 1;
        }

        /* Container */
        .container {
            position: relative; z-index: 10;
            padding: 40px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Login Screen */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            gap: 30px;
        }

        .login-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .login-box h1 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .login-box p {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 35px;
        }

        .login-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 3px;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--glow-cyan);
        }

        .login-input::placeholder {
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--glass-bg);
            border: 1px solid var(--primary);
            border-radius: 50px;
            color: var(--primary);
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: rgba(0,240,255,0.1);
            box-shadow: 0 0 25px var(--glow-cyan);
            transform: translateY(-2px);
        }

        .login-error {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }

        /* Admin Panel */
        #admin-panel { display: none; }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .admin-header h2 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-header p {
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .logout-btn {
            padding: 10px 24px;
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: rgba(255,255,255,0.5);
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-pill {
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 12px;
            letter-spacing: 1px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
        }

        .stat-pill span {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-right: 6px;
        }

        .stat-pill.pending span { color: #f0b429; }
        .stat-pill.approved span { color: var(--primary); }
        .stat-pill.total span { color: rgba(255,255,255,0.6); }

        /* Filter tabs */
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .filter-tab {
            padding: 10px 22px;
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: rgba(255,255,255,0.5);
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-tab.active,
        .filter-tab:hover {
            background: rgba(0,240,255,0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Reviews list */
        #reviews-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .admin-review-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px 30px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: center;
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .admin-review-card.pending {
            border-left: 3px solid #f0b429;
        }

        .admin-review-card.approved {
            border-left: 3px solid var(--primary);
        }

        .review-info {}

        .review-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .review-name {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
        }

        .review-role-tag {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
        }

        .review-stars-admin {
            color: var(--primary);
            font-size: 14px;
            letter-spacing: 2px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 10px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .status-badge.pending {
            background: rgba(240, 180, 41, 0.15);
            border: 1px solid rgba(240, 180, 41, 0.4);
            color: #f0b429;
        }

        .status-badge.approved {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: var(--primary);
        }

        .review-comment-admin {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            line-height: 1.7;
            font-style: italic;
            margin-bottom: 8px;
        }

        .review-date-admin {
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            letter-spacing: 1px;
        }

        .review-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 120px;
        }

        .btn-approve {
            padding: 10px 18px;
            background: rgba(0,240,255,0.1);
            border: 1px solid var(--primary);
            border-radius: 50px;
            color: var(--primary);
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-approve:hover {
            background: rgba(0,240,255,0.2);
            box-shadow: 0 0 15px var(--glow-cyan);
        }

        .btn-approve:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-delete {
            padding: 10px 18px;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.4);
            border-radius: 50px;
            color: #ff6b6b;
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-delete:hover {
            background: rgba(255, 107, 107, 0.2);
            box-shadow: 0 0 15px rgba(255,107,107,0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.3);
            font-size: 15px;
            letter-spacing: 1px;
        }

        .loading-state {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            letter-spacing: 2px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .admin-review-card {
                grid-template-columns: 1fr;
            }
            .review-actions {
                flex-direction: row;
                min-width: auto;
            }
        }
    </style>
</head>
<body>

    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    <div class="grid-overlay"></div>

    <div class="container">

        <!-- ==================== LOGIN ==================== -->
        <div id="login-screen">
            <div class="login-box">
                <h1>MAVG Admin</h1>
                <p>PANEL DE OPINIONES</p>
                <input
                    type="password"
                    class="login-input"
                    id="admin-key-input"
                    placeholder="Introduce tu clave"
                    autocomplete="off"
                >
                <button class="login-btn" id="login-btn">
                    <i class="fas fa-lock"></i> Acceder
                </button>
                <div class="login-error" id="login-error"></div>
            </div>
        </div>

        <!-- ==================== PANEL ADMIN ==================== -->
        <div id="admin-panel">

            <div class="admin-header">
                <div>
                    <h2>Panel de Opiniones</h2>
                    <p>MAVG DEVELOPER · GESTIÓN DE RESEÑAS</p>
                </div>
                <button class="logout-btn" id="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </div>

            <div class="stats-bar">
                <div class="stat-pill pending"><span id="count-pending">0</span> Pendientes</div>
                <div class="stat-pill approved"><span id="count-approved">0</span> Publicadas</div>
                <div class="stat-pill total"><span id="count-total">0</span> Total</div>
            </div>

            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">Todas</button>
                <button class="filter-tab" data-filter="pending">Pendientes</button>
                <button class="filter-tab" data-filter="approved">Publicadas</button>
            </div>

            <div id="reviews-list">
                <div class="loading-state">Cargando opiniones...</div>
            </div>

        </div>

    </div>

    <script>
        const API_BASE = 'https://portfolioprofesional-backend.onrender.com/api/reviews';
        let adminKey = '';
        let allReviews = [];
        let currentFilter = 'all';

        // ==================== LOGIN ====================
        const loginBtn = document.getElementById('login-btn');
        const adminKeyInput = document.getElementById('admin-key-input');
        const loginError = document.getElementById('login-error');

        async function login() {
            const key = adminKeyInput.value.trim();
            if (!key) return;

            loginBtn.textContent = 'Verificando...';
            loginBtn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/admin/all`, {
                    headers: { 'x-admin-key': key }
                });

                if (res.status === 401) {
                    loginError.textContent = 'Clave incorrecta. Inténtalo de nuevo.';
                    loginBtn.innerHTML = '<i class="fas fa-lock"></i> Acceder';
                    loginBtn.disabled = false;
                    return;
                }

                const data = await res.json();
                adminKey = key;
                allReviews = data.data;

                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';

                renderStats();
                renderReviews();

            } catch (err) {
                loginError.textContent = 'Error de conexión. Inténtalo de nuevo.';
                loginBtn.innerHTML = '<i class="fas fa-lock"></i> Acceder';
                loginBtn.disabled = false;
            }
        }

        loginBtn.addEventListener('click', login);
        adminKeyInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

        // ==================== LOGOUT ====================
        document.getElementById('logout-btn').addEventListener('click', () => {
            adminKey = '';
            allReviews = [];
            adminKeyInput.value = '';
            loginError.textContent = '';
            loginBtn.innerHTML = '<i class="fas fa-lock"></i> Acceder';
            loginBtn.disabled = false;
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
        });

        // ==================== FILTROS ====================
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderReviews();
            });
        });

        // ==================== STATS ====================
        function renderStats() {
            const pending = allReviews.filter(r => !r.approved).length;
            const approved = allReviews.filter(r => r.approved).length;
            document.getElementById('count-pending').textContent = pending;
            document.getElementById('count-approved').textContent = approved;
            document.getElementById('count-total').textContent = allReviews.length;
        }

        // ==================== RENDER REVIEWS ====================
        function renderReviews() {
            const list = document.getElementById('reviews-list');

            let filtered = allReviews;
            if (currentFilter === 'pending') filtered = allReviews.filter(r => !r.approved);
            if (currentFilter === 'approved') filtered = allReviews.filter(r => r.approved);

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state">No hay opiniones en esta categoría.</div>';
                return;
            }

            list.innerHTML = filtered.map(review => `
                <div class="admin-review-card ${review.approved ? 'approved' : 'pending'}" id="card-${review._id}">
                    <div class="review-info">
                        <div class="review-meta">
                            <span class="review-name">${review.name}</span>
                            ${review.role ? `<span class="review-role-tag">${review.role}</span>` : ''}
                            <span class="review-stars-admin">${'★'.repeat(review.rating)}${'☆'.repeat(5 - review.rating)}</span>
                            <span class="status-badge ${review.approved ? 'approved' : 'pending'}">
                                ${review.approved ? 'PUBLICADA' : 'PENDIENTE'}
                            </span>
                        </div>
                        <div class="review-comment-admin">"${review.comment}"</div>
                        <div class="review-date-admin">${new Date(review.createdAt).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' })}</div>
                    </div>
                    <div class="review-actions">
                        ${!review.approved ? `
                            <button class="btn-approve" onclick="approveReview('${review._id}')">
                                <i class="fas fa-check"></i> Aprobar
                            </button>
                        ` : `
                            <button class="btn-approve" disabled>
                                <i class="fas fa-check"></i> Publicada
                            </button>
                        `}
                        <button class="btn-delete" onclick="deleteReview('${review._id}')">
                            <i class="fas fa-trash"></i> Eliminar
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ==================== APROBAR ====================
        async function approveReview(id) {
            try {
                const res = await fetch(`${API_BASE}/admin/${id}/approve`, {
                    method: 'PATCH',
                    headers: { 'x-admin-key': adminKey }
                });
                const data = await res.json();
                if (data.success) {
                    const review = allReviews.find(r => r._id === id);
                    if (review) review.approved = true;
                    renderStats();
                    renderReviews();
                }
            } catch (err) {
                alert('Error al aprobar la opinión.');
            }
        }

        // ==================== ELIMINAR ====================
        async function deleteReview(id) {
            if (!confirm('¿Seguro que quieres eliminar esta opinión?')) return;
            try {
                const res = await fetch(`${API_BASE}/admin/${id}`, {
                    method: 'DELETE',
                    headers: { 'x-admin-key': adminKey }
                });
                const data = await res.json();
                if (data.success) {
                    allReviews = allReviews.filter(r => r._id !== id);
                    renderStats();
                    renderReviews();
                }
            } catch (err) {
                alert('Error al eliminar la opinión.');
            }
        }
    </script>

</body>
</html>
